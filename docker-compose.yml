version: '3.8'
services:
  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: kkr_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # NestJS App Service
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: kkr_app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=8080
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - MONGO_URI=mongodb://mongodb:27017/kkr-portfolio-scraper
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (res) => { res.statusCode === 200 ? process.exit(0) : process.exit(1) }).on('error', () => process.exit(1))"] 
      timeout: 10s
      retries: 3
      start_period: 10s
    command: npm run start:dev -- --watch

volumes:
  mongo_data: